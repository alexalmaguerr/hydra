# Proyecto completo en Docker: PostgreSQL + API (NestJS) + Frontend (Vite/React)
# Uso: docker compose up -d
# Frontend: http://localhost:8080   API: http://localhost:3001

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ctcf_dev
    ports:
      - "5432:5432"
    volumes:
      - ctcf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ctcf_dev
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ctcf_dev
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      api-migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  ctcf_pgdata:
